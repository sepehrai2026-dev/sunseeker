<article class="index-card">
  <div class="index-card-no" aria-hidden="true"></div>
  <div class="index-card-main">
    <header class="index-card-head">
      <h3 class="index-card-name">{{item.name}}</h3>
      <span class="index-card-tag">{{item.tag}}</span>
    </header>
    <p class="index-card-desc">{{item.description}}</p>
    <ul class="index-card-points">
      {{item.features}}
    </ul>
    <a class="index-card-link" href="{{item.url}}" target="_blank" rel="noopener nofollow">{{item.cta}} <span class="link-arrow" aria-hidden="true">&rarr;</span></a>
  </div>
</article>
