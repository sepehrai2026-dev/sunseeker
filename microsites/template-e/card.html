<article class="row-card" style="--i:{{item.index}}">
  <div class="row-visual" aria-hidden="true">
    <div class="row-visual-fill" style="background:{{item.bannerBg}}"></div>
    <span class="row-visual-num mono"></span>
  </div>
  <div class="row-body">
    <div class="row-topline">
      <span class="row-tag mono">{{item.tag}}</span>
      <span class="row-meta mono">{{item.meta}}</span>
    </div>
    <h3 class="row-title">{{item.name}}</h3>
    <p class="row-desc">{{item.description}}</p>
  </div>
</article>
